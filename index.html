<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Training ID</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="loading" class="center">
    <p>Memuat data...</p>
  </div>

  <div id="error" class="center" style="display:none">
    <p>❌ Karyawan tidak ditemukan.</p>
  </div>

  <div id="profile-card" style="display:none">
    <div class="header">
      <div class="avatar" id="avatar"></div>
      <div>
        <h1 id="nama"></h1>
        <p id="divisi-jabatan"></p>
        <span class="badge" id="employee-id"></span>
      </div>
    </div>

    <div class="stats">
      <div class="stat-box">
        <div class="stat-num" id="count-selesai">0</div>
        <div class="stat-label">Selesai</div>
      </div>
      <div class="stat-box">
        <div class="stat-num" id="count-belum">0</div>
        <div class="stat-label">Belum</div>
      </div>
    </div>

    <div class="training-list" id="training-selesai-section">
      <div class="section-title">Sudah Training</div>
      <div id="list-selesai"></div>
    </div>

    <div class="training-list" id="training-belum-section">
      <div class="section-title">Belum Training</div>
      <div id="list-belum"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
