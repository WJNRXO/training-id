<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Training ID</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f5f5f0;
      padding: 2rem 1rem;
    }
    h1 {
      text-align: center;
      font-size: 20px;
      color: #1a1a2e;
      margin-bottom: 0.5rem;
    }
    .subtitle {
      text-align: center;
      font-size: 13px;
      color: #888;
      margin-bottom: 2rem;
    }
    #loading {
      text-align: center;
      color: #888;
      padding: 3rem;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1rem;
      max-width: 900px;
      margin: 0 auto;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 1.25rem;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    }
    .card-name {
      font-size: 14px;
      font-weight: 600;
      color: #1a1a2e;
      margin-bottom: 2px;
    }
    .card-divisi {
      font-size: 11px;
      color: #888;
      margin-bottom: 12px;
    }
    .card-id {
      font-size: 11px;
      color: #e8c87a;
      background: #1a1a2e;
      display: inline-block;
      padding: 2px 10px;
      border-radius: 20px;
      margin-bottom: 12px;
    }
    .qr-wrapper {
      display: flex;
      justify-content: center;
      margin-bottom: 12px;
    }
    .qr-wrapper canvas,
    .qr-wrapper img {
      border-radius: 6px;
    }
    .btn-download {
      display: inline-block;
      font-size: 12px;
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid #1a1a2e;
      color: #1a1a2e;
      background: white;
      cursor: pointer;
      text-decoration: none;
    }
    .btn-download:hover {
      background: #1a1a2e;
      color: white;
    }
  </style>
</head>
<body>

  <h1>Admin — QR Code Karyawan</h1>
  <p class="subtitle">Scan QR untuk melihat status training masing-masing karyawan</p>

  <div id="loading">Memuat data karyawan...</div>
  <div class="grid" id="grid"></div>

  <script>
    // GANTI dengan URL Apps Script kamu
    const API_URL = 'https://script.google.com/macros/s/AKfycbyw6XChl7hHQEDGIBC0BwoN7OQLX7FVDMJsS1Nej0CLon_kyad-jVx5qFuApp3wkrDI/exec';

    // GANTI dengan URL GitHub Pages kamu
    const BASE_URL = 'https://wjnrxo.github.io/training-id/';

    async function loadKaryawan() {
      try {
        const res = await fetch(API_URL + '?action=list', { redirect: 'follow' });
        const data = await res.json();

        document.getElementById('loading').style.display = 'none';

        data.karyawan.forEach(function(k) {
          buatCard(k);
        });

      } catch (err) {
        document.getElementById('loading').textContent = 'Gagal memuat data.';
        console.log(err);
      }
    }

    function buatCard(k) {
      const url = BASE_URL + '?id=' + k.employee_id;

      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML =
        '<div class="card-name">' + k.nama + '</div>' +
        '<div class="card-divisi">' + k.divisi + ' · ' + k.jabatan + '</div>' +
        '<div class="card-id">' + k.employee_id + '</div>' +
        '<div class="qr-wrapper" id="qr-' + k.employee_id + '"></div>' +
        '<a class="btn-download" id="dl-' + k.employee_id + '" download="QR-' + k.employee_id + '.png">Download QR</a>';

      document.getElementById('grid').appendChild(card);

      // Generate QR
      var qr = new QRCode(document.getElementById('qr-' + k.employee_id), {
        text: url,
        width: 140,
        height: 140,
        colorDark: '#1a1a2e',
        colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.H
      });

      // Aktifkan tombol download setelah QR selesai render
      setTimeout(function() {
        var canvas = document.querySelector('#qr-' + k.employee_id + ' canvas');
        if (canvas) {
          var dlBtn = document.getElementById('dl-' + k.employee_id);
          dlBtn.href = canvas.toDataURL('image/png');
        }
      }, 500);
    }

    loadKaryawan();
  </script>

</body>
</html>
